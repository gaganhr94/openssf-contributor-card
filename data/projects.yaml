# OpenSSF projects and the repos that constitute each project.
#
# Source of truth for what `contribcard` ingests. Edit this file to add or
# remove projects/repos. A push to `data/**` triggers a CI rebuild.
#
# Stages mirror openssf.org/projects: graduated | incubating | sandbox.
# Repos are listed as "owner/name" (case as on GitHub).

projects:
  - slug: best-practices-badge
    name: Best Practices Badge
    maturity: graduated
    url: https://openssf.org/projects/best-practices-badge/
    repos:
      - coreinfrastructure/best-practices-badge

